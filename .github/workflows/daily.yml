name: Daily rebuild

on:
  schedule:
    - cron: '0 13 * * *'  # 7am Chicago CT (UTC-6 winter / UTC-5 summer)
  workflow_dispatch:       # Manual trigger from GitHub Actions tab

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel redeploy
        run: curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
